<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Charmarket</title>

  <!-- ICONOS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI', sans-serif;
    }

    body{
      background:#f4f4f4;
      padding:20px;
    }

    .container{
      max-width:1100px;
      margin:auto;
    }

    /* HEADER */

    .top{
      text-align:center;
      margin-bottom:25px;
    }

    .logo{
      width:90px;
      height:90px;
      border-radius:50%;
      overflow:hidden;
      margin:auto;
      box-shadow:0 5px 20px rgba(0,0,0,0.15);
      border:4px solid white;
    }

    .logo img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .sparkles{
      color:#ff9800;
      margin-top:8px;
      font-size:14px;
    }

    .title{
      margin-top:12px;
      font-size:32px;
      font-weight:bold;
      color:#222;
    }

    .line{
      width:150px;
      height:5px;
      background:linear-gradient(to right,#ff7b00,#ffb347);
      margin:10px auto 0;
      border-radius:10px;
    }

    /* CARD */

    .card{
      background:white;
      border-radius:25px;
      padding:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
      margin-bottom:25px;
    }

    .subtitle{
      font-size:22px;
      font-weight:bold;
      margin-bottom:20px;
      color:#333;
    }

    /* INPUTS */

    .input-group{
      display:flex;
      align-items:center;
      background:#fff5ea;
      padding:15px;
      border-radius:15px;
      margin-bottom:15px;
      border:2px solid transparent;
      transition:0.3s;
    }

    .input-group:focus-within{
      border-color:#ff9800;
    }

    .input-group i{
      color:#ff9800;
      font-size:18px;
      margin-right:10px;
    }

    .input-group input{
      border:none;
      background:transparent;
      width:100%;
      outline:none;
      font-size:16px;
    }

    /* BOTONES */

    .buttons{
      display:flex;
      gap:15px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .btn{
      flex:1;
      min-width:200px;
      border:none;
      padding:15px;
      border-radius:15px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .btn-light{
      background:#fff3e0;
      color:#ff7b00;
    }

    .btn-main{
      background:linear-gradient(to right,#ff7b00,#ff9800);
      color:white;
    }

    /* MENSAJES */

    #mensaje{
      margin-top:20px;
      padding:15px;
      border-radius:15px;
      text-align:center;
      font-weight:bold;
      color:white;
      display:none;
    }

    .mensaje-puntos{
      background:#28a745;
    }

    .mensaje-no-puntos{
      background:#dc3545;
    }

    .mensaje-error{
      background:#6c757d;
    }

    .mensaje-fecha-limite{
      background:#ff9800;
      color:black;
    }

    /* PUNTOS */

    #puntos{
      margin-top:20px;
      text-align:center;
      font-size:24px;
      color:#28a745;
    }

    /* BOOSTERS */

    #boosters{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:20px;
      margin-top:30px;
    }

    .premio{
      background:white;
      border-radius:20px;
      padding:15px;
      text-align:center;
      box-shadow:0 5px 20px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .premio:hover{
      transform:translateY(-5px);
    }

    .premio img{
      width:100%;
      height:140px;
      object-fit:contain;
      margin-bottom:10px;
    }

    .premio b{
      color:#222;
      font-size:18px;
    }

    .premio input{
      width:70px;
      padding:8px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #ccc;
      text-align:center;
    }

    @media(max-width:768px){

      #boosters{
        grid-template-columns:repeat(2,1fr);
      }

      .title{
        font-size:26px;
      }

      .buttons{
        flex-direction:column;
      }

      .btn{
        width:100%;
      }

    }

  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->

  <div class="top">

    <!-- ACA DESPUES VAMOS A PONER TU LOGO -->
    <div class="logo">
      <img src="https://lh3.googleusercontent.com/d/1kdUUypk6s558Qmu5ocRPCK7isohJ8kTy">
    </div>

    <div class="sparkles">✨ ✨ ✨</div>

    <div class="title">
      Bienvenido Charmarket
    </div>

    <div class="line"></div>

  </div>

  <!-- CARD -->

  <div class="card">

    <div class="subtitle">
      Canje de Boosters
    </div>

    <!-- INPUT NOMBRE -->

    <div class="input-group">
      <i class="fa-regular fa-user"></i>
      <input id="nombre" placeholder="Ingresa tu nombre">
    </div>

    <!-- INPUT APELLIDO -->

    <div class="input-group">
      <i class="fa-regular fa-user"></i>
      <input id="apellido" placeholder="Ingresa tu apellido">
    </div>

    <!-- MENSAJES -->

    <div id="mensaje"></div>

    <!-- BOTONES -->

    <div class="buttons">

      <button class="btn btn-light" onclick="verPuntos()">
        <i class="fa-regular fa-star"></i>
        Ver puntos
      </button>

      <button class="btn btn-main" onclick="comprar()">
        <i class="fa-solid fa-bag-shopping"></i>
        Confirmar compra
      </button>

    </div>

    <!-- PUNTOS -->

    <h3 id="puntos"></h3>

  </div>

  <!-- BOOSTERS -->

  <div id="boosters"></div>

</div>

<script>

let premios = [];

function verPuntos() {

  const nombre = document.getElementById("nombre").value;
  const apellido = document.getElementById("apellido").value;

  const mensajeDiv = document.getElementById("mensaje");
  const boostersDiv = document.getElementById("boosters");

  if (!nombre || !apellido) {

    mensajeDiv.innerText = "Debes ingresar nombre y apellido";
    mensajeDiv.className = "mensaje-error";
    mensajeDiv.style.display = "block";

    document.getElementById("boosters").innerHTML = "";
    document.getElementById("puntos").innerText = "";

    return;
  }

  google.script.run.withSuccessHandler(function(p) {

    if (p == -1) {

      mensajeDiv.innerText = "Usuario no encontrado";
      mensajeDiv.className = "mensaje-error";
      mensajeDiv.style.display = "block";

      boostersDiv.style.display = "none";

      return;
    }

    if (p === 0) {

      mensajeDiv.innerText = "No tienes puntos para canjear";
      mensajeDiv.className = "mensaje-no-puntos";
      mensajeDiv.style.display = "block";

      boostersDiv.style.display = "none";

    } else {

      document.getElementById("puntos").innerText = "Tus puntos: " + p;
      document.getElementById("puntos").style.display = "block";

      mensajeDiv.style.display = "none";

    }

    const fechaActual = new Date();

    const fechaLimite = new Date(
      fechaActual.getFullYear(),
      fechaActual.getMonth(),
      5,
      23,
      59,
      59
    );

    if (fechaActual > fechaLimite) {

      mensajeDiv.innerText = "Fuera de la fecha límite, ya no puedes canjear tus puntos";
      mensajeDiv.className = "mensaje-fecha-limite";
      mensajeDiv.style.display = "block";

      document.getElementById("puntos").style.display = "none";
      document.getElementById("boosters").style.display = "none";

      return;
    }

    google.script.run.withSuccessHandler(function(data) {

      premios = data.premios;

      let html = "";

      for (let i = 1; i < premios.length; i++) {

        html += "<div class='premio'>";

        html += "<img src='" + premios[i][3] + "&t=" + new Date().getTime() + "' onerror='this.src=\"https://via.placeholder.com/100x100?text=Sin+Imagen\"'>";

        html += "<br><b>" + premios[i][0] + "</b><br><br>";

        html += premios[i][1] + " pts<br>";

        html += "Stock: <span id='stock" + i + "'>" + premios[i][2] + "</span><br><br>";

        html += "Cantidad:<br>";

        html += "<input type='number' min='0' max='" + premios[i][2] + "' value='0' id='b"+i+"'>";

        html += "</div>";
      }

      document.getElementById("boosters").style.display = "grid";

      document.getElementById("boosters").innerHTML = html;

    }).obtenerDatos();

  }).obtenerPuntos(nombre, apellido);

}

function comprar() {

  const nombre = document.getElementById("nombre").value;
  const apellido = document.getElementById("apellido").value;

  if (!nombre || !apellido) {

    alert("Debes ingresar nombre y apellido antes de comprar");

    return;
  }

  let carrito = [];

  let mensajeError = false;

  for (let i = 1; i < premios.length; i++) {

    let cantidad = document.getElementById("b" + i).value;

    cantidad = Number(cantidad);

    if (cantidad > 0) {

      if (cantidad > 10) {

        mensajeError = true;

        alert("Solo puedes seleccionar hasta 10 de un mismo premio.");

        break;
      }

      carrito.push({
        booster: premios[i][0],
        cantidad: Number(cantidad)
      });

    }

  }

  if (mensajeError) {
    return;
  }

  if (carrito.length === 0) {

    alert("Debes seleccionar al menos un premio");

    return;
  }

  google.script.run.withSuccessHandler(function(res) {

    const mensajeDiv = document.getElementById("mensaje");

    mensajeDiv.innerText = res;

    mensajeDiv.className = "mensaje-puntos";

    mensajeDiv.style.display = "block";

    document.getElementById("nombre").value = "";
    document.getElementById("apellido").value = "";

    document.getElementById("puntos").style.display = "none";

    setTimeout(function () {

      document.getElementById("mensaje").style.display = "none";

      document.getElementById("puntos").style.display = "none";

      document.getElementById("boosters").innerHTML = "";

    }, 3000);

  }).procesarCompra(nombre, apellido, carrito);

}

</script>

</body>
</html>
