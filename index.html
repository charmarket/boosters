<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Charmarket</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI', sans-serif;
    }

    body{
      background:#f4f4f4;
      padding:20px;
      position:relative;
      overflow-x:hidden;
    }

    /* FONDO RULETA */

    body::before{

      content:"";

      position:fixed;

      top:50%;
      left:50%;

      transform:translate(-50%,-50%);

      width:1200px;
      height:1200px;

      background-image:url('https://lh3.googleusercontent.com/d/1WdB_N_o50RRWUVba7fKzr0Tew4bJ3pKd');

      background-repeat:no-repeat;
      background-position:center;
      background-size:contain;

      opacity:0.08;

      z-index:-1;

      filter:blur(1px);

    }

    .container{
      max-width:1100px;
      margin:auto;
      position:relative;
      z-index:2;
    }

    .top{
      text-align:center;
      margin-bottom:25px;
    }

    .logo{
      width:90px;
      height:90px;
      border-radius:50%;
      overflow:hidden;
      margin:auto;
      box-shadow:0 5px 20px rgba(0,0,0,0.15);
      border:4px solid white;
      background:white;
    }

    .logo img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .sparkles{
      color:#ff9800;
      margin-top:8px;
      font-size:14px;
    }

    .title{
      margin-top:12px;
      font-size:32px;
      font-weight:bold;
      color:#222;
    }

    .line{
      width:150px;
      height:5px;
      background:linear-gradient(to right,#ff7b00,#ffb347);
      margin:10px auto 0;
      border-radius:10px;
    }

    .card{
      background:rgba(255,255,255,0.95);
      backdrop-filter:blur(3px);
      border-radius:25px;
      padding:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
      margin-bottom:25px;
    }

    .subtitle{
      font-size:22px;
      font-weight:bold;
      margin-bottom:20px;
      color:#333;
    }

    .input-group{
      display:flex;
      align-items:center;
      background:#fff5ea;
      padding:15px;
      border-radius:15px;
      margin-bottom:15px;
      border:2px solid transparent;
      transition:0.3s;
    }

    .input-group:focus-within{
      border-color:#ff9800;
    }

    .input-group i{
      color:#ff9800;
      font-size:18px;
      margin-right:10px;
    }

    .input-group input{
      border:none;
      background:transparent;
      width:100%;
      outline:none;
      font-size:16px;
    }

    .buttons{
      display:flex;
      gap:15px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .btn{
      flex:1;
      min-width:200px;
      border:none;
      padding:15px;
      border-radius:15px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .btn-light{
      background:#fff3e0;
      color:#ff7b00;
    }

    .btn-main{
      background:linear-gradient(to right,#ff7b00,#ff9800);
      color:white;
    }

    #mensaje{
      margin-top:20px;
      padding:15px;
      border-radius:15px;
      text-align:center;
      font-weight:bold;
      color:white;
      display:none;
    }

    .mensaje-puntos{
      background:#28a745;
    }

    .mensaje-no-puntos{
      background:#dc3545;
    }

    .mensaje-error{
      background:#6c757d;
    }

    #puntos{
      margin-top:20px;
      text-align:center;
      font-size:24px;
      color:#28a745;
    }

    #boosters{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:20px;
      margin-top:30px;
    }

    .premio{
      background:rgba(255,255,255,0.96);
      backdrop-filter:blur(3px);
      border-radius:20px;
      padding:15px;
      text-align:center;
      box-shadow:0 5px 20px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .premio:hover{
      transform:translateY(-5px);
    }

    .premio img{
      width:100%;
      height:140px;
      object-fit:contain;
      margin-bottom:10px;
    }

    .premio b{
      color:#222;
      font-size:18px;
    }

    .premio input{
      width:70px;
      padding:8px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #ccc;
      text-align:center;
    }

    @media(max-width:768px){

      body::before{

        width:700px;
        height:700px;

        opacity:0.06;
      }

      #boosters{
        grid-template-columns:repeat(2,1fr);
      }

      .title{
        font-size:26px;
      }

      .buttons{
        flex-direction:column;
      }

      .btn{
        width:100%;
      }

    }

  </style>
</head>

<body>

<div class="container">

  <div class="top">

    <div class="logo">
      <img src="https://lh3.googleusercontent.com/d/1kdUUypk6s558Qmu5ocRPCK7isohJ8kTy">
    </div>

    <div class="sparkles">✨ ✨ ✨</div>

    <div class="title">
      Bienvenido Charmarket
    </div>

    <div class="line"></div>

  </div>

  <div class="card">

    <div class="subtitle">
      Canje de Boosters
    </div>

    <div class="input-group">
      <i class="fa-regular fa-user"></i>
      <input id="nombre" placeholder="Ingresa tu nombre">
    </div>

    <div class="input-group">
      <i class="fa-regular fa-user"></i>
      <input id="apellido" placeholder="Ingresa tu apellido">
    </div>

    <div id="mensaje"></div>

    <div class="buttons">

      <button class="btn btn-light" onclick="verPuntos()">
        <i class="fa-regular fa-star"></i>
        Ver puntos
      </button>

      <button class="btn btn-main" onclick="comprar()">
        <i class="fa-solid fa-bag-shopping"></i>
        Confirmar compra
      </button>

    </div>

    <h3 id="puntos"></h3>

  </div>

  <div id="boosters"></div>

</div>

</body>
</html>
